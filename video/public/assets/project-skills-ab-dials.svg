<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">RelayStack project skills A/B metric dials</title>
  <desc id="desc">Circular metric dials comparing clean baseline against RelayStack project skills on Multi-SWE-bench flash.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="relay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .small { font: 500 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .label { font: 700 32px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .value { font: 800 48px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .delta { font: 800 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #bbf7d0; }
      .meta { font: 600 23px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1672" height="941" rx="42" fill="url(#bg)"/>
  <circle cx="1320" cy="0" r="390" fill="#14b8a6" opacity="0.13"/>
  <circle cx="160" cy="900" r="320" fill="#22c55e" opacity="0.11"/>

  <text x="88" y="116" font-family="Inter, ui-sans-serif, system-ui" font-size="58" font-weight="850" fill="#ffffff">Project skills A/B smoke test</text>
  <text x="90" y="166" class="small">Full gray ring = clean baseline. Colored arc = RelayStack remaining cost versus baseline.</text>
  <text x="90" y="204" class="meta">ByteDance-Seed/Multi-SWE-bench-flash, darkreader PR 7241, official harness resolved 1/1 in both groups</text>

  <g transform="translate(88 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#relay)" stroke-width="30" pathLength="100" stroke-dasharray="34.1 65.9" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <text x="174" y="160" text-anchor="middle" class="value">34.1%</text>
    <text x="174" y="200" text-anchor="middle" class="meta">of baseline</text>
    <text x="42" y="342" class="label">Total tokens</text>
    <text x="42" y="390" class="delta">822k → 281k</text>
    <text x="42" y="432" class="meta">541,609 fewer tokens</text>
  </g>

  <g transform="translate(478 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#relay)" stroke-width="30" pathLength="100" stroke-dasharray="81.3 18.7" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <text x="174" y="160" text-anchor="middle" class="value">81.3%</text>
    <text x="174" y="200" text-anchor="middle" class="meta">of baseline</text>
    <text x="42" y="342" class="label">Elapsed time</text>
    <text x="42" y="390" class="delta">64.927s faster</text>
    <text x="42" y="432" class="meta">347.771s → 282.844s</text>
  </g>

  <g transform="translate(868 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#relay)" stroke-width="30" pathLength="100" stroke-dasharray="50 50" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <text x="174" y="160" text-anchor="middle" class="value">50.0%</text>
    <text x="174" y="200" text-anchor="middle" class="meta">of baseline</text>
    <text x="42" y="342" class="label">Commands started</text>
    <text x="42" y="390" class="delta">32 → 16</text>
    <text x="42" y="432" class="meta">Half the shell churn</text>
  </g>

  <g transform="translate(1258 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#relay)" stroke-width="30" pathLength="100" stroke-dasharray="55.6 44.4" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <text x="174" y="160" text-anchor="middle" class="value">55.6%</text>
    <text x="174" y="200" text-anchor="middle" class="meta">of baseline</text>
    <text x="42" y="342" class="label">Patch size</text>
    <text x="42" y="390" class="delta">1,016 → 565 bytes</text>
    <text x="42" y="432" class="meta">451 bytes smaller</text>
  </g>

  <g transform="translate(92 832)">
    <rect width="1490" height="54" rx="27" fill="#020617" opacity="0.36"/>
    <circle cx="34" cy="27" r="12" fill="#334155"/>
    <text x="58" y="36" class="meta">clean baseline</text>
    <circle cx="278" cy="27" r="12" fill="#22c55e"/>
    <text x="302" y="36" class="meta">RelayStack project skills</text>
    <text x="710" y="36" class="meta">Both groups resolved 1/1; advantage is continuation efficiency, not pass-rate inflation.</text>
  </g>
</svg>
