<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">RelayStack continuation cost benchmark dials</title>
  <desc id="desc">Circular metric dials comparing RelayStack against baseline for elapsed time, reported tokens, repeated exploration, and blind reviewer wins.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="relay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .small { font: 500 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .label { font: 700 32px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .value { font: 800 48px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .delta { font: 800 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #bbf7d0; }
      .meta { font: 600 23px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1672" height="941" rx="42" fill="url(#bg)"/>
  <circle cx="1340" cy="-40" r="360" fill="#1d4ed8" opacity="0.18"/>
  <circle cx="116" cy="848" r="310" fill="#0891b2" opacity="0.15"/>

  <text x="88" y="116" font-family="Inter, ui-sans-serif, system-ui" font-size="58" font-weight="850" fill="#ffffff">RelayStack continuation cost</text>
  <text x="90" y="166" class="small">Full gray ring = baseline. Colored arc = RelayStack result on the same benchmark.</text>
  <text x="90" y="204" class="meta">25-task combined benchmark plus 20-task blind review, generated 2026-06-25</text>

  <g transform="translate(88 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#relay)" stroke-width="30" pathLength="100" stroke-dasharray="75.9 24.1" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <text x="174" y="160" text-anchor="middle" class="value">75.9%</text>
    <text x="174" y="200" text-anchor="middle" class="meta">of baseline</text>
    <text x="42" y="342" class="label">Elapsed time</text>
    <text x="42" y="390" class="delta">24.1% faster</text>
    <text x="42" y="432" class="meta">2834.258s → 2152.400s</text>
  </g>

  <g transform="translate(478 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#relay)" stroke-width="30" pathLength="100" stroke-dasharray="77 23" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <text x="174" y="160" text-anchor="middle" class="value">77.0%</text>
    <text x="174" y="200" text-anchor="middle" class="meta">of baseline</text>
    <text x="42" y="342" class="label">Reported tokens</text>
    <text x="42" y="390" class="delta">23.0% lower</text>
    <text x="42" y="432" class="meta">11.31M → 8.71M tokens</text>
  </g>

  <g transform="translate(868 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#relay)" stroke-width="30" pathLength="100" stroke-dasharray="0 100" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <circle cx="174" cy="60" r="15" fill="#34d399"/>
    <text x="174" y="160" text-anchor="middle" class="value">0</text>
    <text x="174" y="200" text-anchor="middle" class="meta">repeats</text>
    <text x="42" y="342" class="label">Known-info repeats</text>
    <text x="42" y="390" class="delta">4 → 0</text>
    <text x="42" y="432" class="meta">Baseline repeated 4 times</text>
  </g>

  <g transform="translate(1258 270)" filter="url(#shadow)">
    <rect width="348" height="490" rx="28" fill="#0f172a" opacity="0.88"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="#334155" stroke-width="30"/>
    <circle cx="174" cy="172" r="112" fill="none" stroke="url(#warn)" stroke-width="30" pathLength="100" stroke-dasharray="88.3 11.7" stroke-linecap="round" transform="rotate(-90 174 172)"/>
    <text x="174" y="160" text-anchor="middle" class="value">53/60</text>
    <text x="174" y="200" text-anchor="middle" class="meta">blind wins</text>
    <text x="42" y="342" class="label">Reviewer signal</text>
    <text x="42" y="390" class="delta">88.3% preferred</text>
    <text x="42" y="432" class="meta">Baseline won 7/60</text>
  </g>

  <g transform="translate(92 832)">
    <rect width="1490" height="54" rx="27" fill="#020617" opacity="0.36"/>
    <circle cx="34" cy="27" r="12" fill="#334155"/>
    <text x="58" y="36" class="meta">baseline full ring</text>
    <circle cx="296" cy="27" r="12" fill="#34d399"/>
    <text x="320" y="36" class="meta">RelayStack result</text>
    <text x="680" y="36" class="meta">Pass rate support: baseline 92.0%, RelayStack 96.0%</text>
  </g>
</svg>
